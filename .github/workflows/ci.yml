name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund
        env:
          # Skip Husky / RN postinstalls that don't apply in CI
          CI: true

      - name: Typecheck (root app)
        run: npx tsc --noEmit

      - name: Generate case-summary draft (smoke test)
        # Confirms the pure-data module and the export script stay in sync.
        run: npx ts-node --transpile-only scripts/generate-case-summary.ts

      - name: Upload generated case-summary
        uses: actions/upload-artifact@v7
        with:
          name: case-summary-draft
          path: exports/case-summary-sd38180-DRAFT.md
          if-no-files-found: warn

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund
        env:
          CI: true

      - name: Run ESLint
        # Fails on errors; allows warnings. Remove --max-warnings once the
        # pre-existing warning backlog is cleared (then just: npm run lint).
        run: npm run lint -- --max-warnings=9999

  jest:
    name: Jest unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
        env:
          CI: true
      - name: Run jest
        # No --passWithNoTests: an empty suite must fail so the security-
        # critical modules (redaction, authz, pii, session timeout) stay tested.
        run: npm test --silent -- --ci

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --no-audit --no-fund
        env:
          CI: true
      - name: Audit production dependencies (fail on critical)
        run: npm audit --omit=dev --audit-level=critical
      - name: Audit report (high+, informational)
        if: always()
        run: npm audit --omit=dev --audit-level=high || true

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Scan for committed secrets
        run: |
          if grep -rEn '(sk_live_|whsec_live_|AKIA[0-9A-Z]{16}|-----BEGIN [A-Z ]+PRIVATE KEY-----)' \
               --include='*.ts' --include='*.tsx' --include='*.js' --include='*.json' \
               --exclude-dir=node_modules --exclude-dir=.git . ; then
            echo "::error::Possible secret committed"
            exit 1
          fi
